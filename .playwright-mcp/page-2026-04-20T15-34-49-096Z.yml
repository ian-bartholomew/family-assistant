            - paragraph [ref=e1501]: New Lower Prices Terms & Conditions
            - paragraph [ref=e1502]: "*New Lower Price (“NLP”) items are identified as items currently tagged with a base retail price of at least 8% or $1 lower than the item’s previous base retail price. NLP classification does not account for or reflect temporary price reductions, sales, special offers or other item or basket level discounts of an item which may have been applicable to certain items before or may be applicable after the NLP classification."
            - paragraph [ref=e1503]: NLP classification varies by Albertsons Companies division and stores but is applied across hundreds of retail items in a cross-section reflecting many of the main food and merchandise product categories throughout each participating store. NLP classification may apply only to certain item and/or brand sizes, flavors or denominations but not others of the same item and/or brand. The number of items and percentage of total SKUs with NLP classification may change daily with the NLP tag providing official status for an item. NLP classification is not applied to certain categories of items, including but not limited to, most alcohol, dairy & egg, floral & gift candy, and vehicle service (including car wash and gasoline) products as well as in-store and digital service offerings.
            - paragraph [ref=e1504]: NLP classified items may vary by Albertsons Companies divisions, banners, or stores and are subject to additional price changes in the course of business. See all NLP classified items by looking in-store or on-line for any item shown with an official “New Lower Price” tag.
