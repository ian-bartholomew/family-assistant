              - text: Enter promo code SAVE30 at checkout
              - text: "**OFFER DETAILS: TO SAVE $30 YOU MUST SPEND $75 OR MORE IN A SINGLE TRANSACTION FOR YOUR FIRST ONLINE PICKUP OR DELIVERY ORDER OF QUALIFYING ITEMS PURCHASED VIA A COMPANY-OWNED CHANNEL (i.e. THE Vons WEBSITE OR MOBILE APP). OFFER DOES NOT APPLY TO ONLINE ORDERS PLACED THROUGH A THIRD-PARTY SUCH AS Instacart, UberEats, DoorDash, ETC. OR ON ORDERS SCHEDULED FOR PICKUP OR DELIVERY AFTER THE OFFER EXPIRATION DATE. Must select PICKUP or DELIVERY option and enter Promo Code SAVE30 at checkout. VALID FOR 1ST TIME ONLINE GROCERY ORDER. LIMIT 1 TIME USE PER HOUSEHOLD ONLY. Eligibility and prior promo code usage will be validated before final application to Order. If we identify from user information submitted or obtained with Order that Promo Code has previously been used by user or household, submission by user is ineligible for promotion and Promo Code will be invalidated for submitted Order. This determination will be at our sole discretion and user of invalidated Promo Code will receive a message that coupon has been invalidated prior to Order finalization. Minimum purchase amount is calculated based on subtotal of all qualifying items at checkout after deduction of all other promotions, offers, discounts, and savings and excludes alcoholic beverages, tobacco, and fluid dairy products, bottle/container deposits, and any fees, charges, and taxes. Offer may not be combined with any other promotion, offer, discount or savings and other restrictions may apply. We reserve the right to modify or cancel offers/orders and/or to correct typographical, pictorial, and other ad or pricing errors. Please review our"
