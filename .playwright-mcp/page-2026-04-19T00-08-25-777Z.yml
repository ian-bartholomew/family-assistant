            - img "Claims" [ref=e946]
            - paragraph [ref=e947]: The story of Dave’s Killer Bread began at the Portland Farmers Market, when Dave Dahl and his nephew brought some loaves of Dave's bread to sell. For Dave, this marked the beginning of a new chapter in his life. Though he grew up in a family of bakers, his life took a different path. A path that landed him in prison for 15 years. Determined to prove his worth and make a positive impact, Dave worked tirelessly to bake breads that tasted unlike anything else on the market — packed with seeds and grains, made with only the very best organic and Non-GMO Project Verified ingredients. Dave’s Killer Bread believes everyone is capable of greatness. One in three of the company's employee partners at their Milwaukie, OR bakery has a criminal background—but your past doesn't define your future. As a proud Second Chance Employer, Dave’s Killer Bread truly believes everyone deserves a second chance to become a Good Seed.
