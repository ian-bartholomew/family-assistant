      - generic [ref=e861]:
        - heading "Product Description" [level=2] [ref=e864]
        - paragraph [ref=e866]: Dave's Killer Bread® Killer Classic® English Muffins are what you love about a classic English muffin, but made killer by the team at Dave's. Each USDA organic English muffin amps up classic taste and texture that is sure to rock your breakfast. Each USDA organic English muffin includes 8 grams of whole grains, and features butter-catching flavor craters to create an out-of-this-world breakfast experience. These tasty, Non-GMO Project Verified English muffins are baked with five super grains, including quinoa, spelt, rye, millet and barley. Plus, no high-fructose corn syrup, no artificial preservatives, no artificial ingredients and no bleached flour. You can trust Dave's Killer Bread® to deliver killer taste, texture and whole grain nutrition. Killer Classic® English muffins are pre-sliced and just what you need for excellent eggs benedict, hearty breakfast sandwiches or buttery English muffins on the go.
